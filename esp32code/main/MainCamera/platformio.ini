[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200

; --- Speed up upload ---
upload_speed = 921600

; --- Monitor Filters ---
monitor_filters = time, colorize

; --- Huge App Partition Scheme ---
; (Required because Camera libraries + WiFi are large)
board_build.partitions = huge_app.csv